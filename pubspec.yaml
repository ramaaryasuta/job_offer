name: job_offers
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  flutter_gen_runner: ^5.12.0

flutter_gen:
  output: lib/gen/

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Thin.ttf
          weight: 100

        - asset: assets/fonts/Inter-ExtraLight.ttf
          weight: 200

        - asset: assets/fonts/Inter-Light.ttf
          weight: 300

        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400

        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500

        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800

        - asset: assets/fonts/Inter-Black.ttf
          weight: 900